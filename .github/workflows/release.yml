name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read plugin version
        id: version
        run: |
          VERSION=$(grep "Version:" traqleads.php | awk '{print $NF}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if release exists
        id: check
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create ZIP
        if: steps.check.outputs.exists == 'false'
        run: |
          mkdir -p dist/traqleads
          rsync -av --exclude='.git' --exclude='dist' --exclude='.github' . dist/traqleads/
          cd dist && zip -r traqleads.zip traqleads/

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            dist/traqleads.zip \
            --title "v${{ steps.version.outputs.version }}" \
            --notes "Version ${{ steps.version.outputs.version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
